<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İndirim Oranı Hesaplama</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    padding:20px;
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:470px;
    background:#fff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:500;
    font-size:13px;
    color:#6b7a90;
}

.field-container{
    display:flex;
    gap:8px;
    align-items:center;
}

input{
    width:100%;
    height:46px;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    font-size:15px;
    text-align:center;
    background:#fff;
    transition:.15s;
}

input:focus{
    outline:none;
    border-color:#8fd4ae;
    box-shadow:0 0 0 4px rgba(143,212,174,0.35);
}

.yellow-bg{
    background:#fff7a6 !important;
}

/* CLEAR */
.clear-btn{
    width:40px;
    height:46px;
    background:#3498db;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-weight:600;
    cursor:pointer;
}

.clear-btn:hover{
    background:#2587ca;
}

/* BUTTONS */
.button-row{
    display:flex;
    gap:10px;
    margin-top:10px;
}

button{
    height:50px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
    transition:.2s;
}

/* HESAPLA */
.main-btn{
    flex:1;
    background:#fff;
    color:#2c3e50;
    border:1.5px solid #c9d2dc;
    font-size:16px;
}

.main-btn:hover{
    background:#f6f8fa;
}

.main-btn.active{
    border-color:#8fd4ae !important;
    box-shadow:0 0 0 4px rgba(143,212,174,0.45) !important;
}

/* RESET */
.reset-btn{
    width:50px;
    min-width:50px;
    background:#fff;
    border:1.5px solid #c9d2dc;
    color:#2c3e50;
    font-size:18px;
}

.reset-btn.active{
    border-color:#e74c3c;
    box-shadow:0 0 0 4px rgba(231,76,60,0.3);
}

/* RESULT */
.result{
    display:none;
    margin-top:20px;
    background:#f7fbf9;
    padding:15px;
    border-radius:10px;
}

.result p{
    margin:8px 0;
    font-size:14px;
    color:#3d4f66;
}

.highlight{
    float:right;
    font-weight:600;
}

.box{
    margin-top:12px;
    padding:10px;
    background:#eaf7ef;
    border-left:4px solid #2ecc71;
    border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<div class="input-group">
<label>Ürünün Önceki Fiyatı</label>
<div class="field-container">
<input id="eskiFiyat" type="tel">
<div class="clear-btn" onclick="temizle('eskiFiyat')">×</div>
</div>
</div>

<div class="input-group">
<label>Ürünün Yeni Fiyatı</label>
<div class="field-container">
<input id="yeniFiyat" type="tel" class="yellow-bg">
<div class="clear-btn" onclick="temizle('yeniFiyat')">×</div>
</div>
</div>

<div class="button-row">

<button id="hesaplaBtn" class="main-btn" onclick="indirimHesapla()">
Hesapla
</button>

<button class="reset-btn" onclick="sifirla(event)">↺</button>

</div>

<div class="result" id="sonucAlani">

<p>Önceki Fiyat <span class="highlight" id="resEski"></span></p>
<p>Yeni Fiyat <span class="highlight" id="resYeni"></span></p>

<div class="box">
<p>İndirim Tutarı <span class="highlight" id="resTutar"></span></p>
<p><b>İndirim Oranı</b> <span class="highlight" id="resIndirim"></span></p>
</div>

</div>

</div>

<script>

function temizle(id){
    const el = document.getElementById(id);
    el.value = "";
    el.focus(); // 👈 yazma moduna geçirir
}

function resetGlowOff(){
    document.querySelector(".reset-btn").classList.remove("active");
}

/* INPUT değişince buton pasif + sonuç kapanır */
document.querySelectorAll("input").forEach(inp=>{
    inp.addEventListener("input", () => {
        resetGlowOff();
        document.getElementById("hesaplaBtn").classList.remove("active");
        document.getElementById("sonucAlani").style.display = "none";
    });
});

function sayi(id){
    let v=document.getElementById(id).value.trim();
    if(!v) return 0;
    return parseFloat(v.replace(/\./g,"").replace(",",".")) || 0;
}

function indirimHesapla(){

    document.getElementById("hesaplaBtn").classList.add("active");

    let eski = sayi("eskiFiyat");
    let yeni = sayi("yeniFiyat");

    if(eski<=0){
        alert("Geçerli eski fiyat gir");
        return;
    }

    let tutar = eski - yeni;
    let oran = (tutar/eski)*100;

    const fmt = {minimumFractionDigits:2,maximumFractionDigits:2};

    document.getElementById("resEski").innerText =
        eski.toLocaleString("tr-TR",fmt)+" TL";

    document.getElementById("resYeni").innerText =
        yeni.toLocaleString("tr-TR",fmt)+" TL";

    document.getElementById("resTutar").innerText =
        tutar.toLocaleString("tr-TR",fmt)+" TL";

    document.getElementById("resIndirim").innerText =
        "%"+oran.toLocaleString("tr-TR",fmt);

    document.getElementById("sonucAlani").style.display="block";
}

function sifirla(e){
    e.preventDefault();

    document.querySelectorAll("input").forEach(i=>i.value="");
    document.getElementById("sonucAlani").style.display="none";

    document.getElementById("hesaplaBtn").classList.remove("active");

    e.currentTarget.classList.add("active");
}

</script>

</body>
</html>
