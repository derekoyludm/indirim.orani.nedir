<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, user-scalable=no">
<title>İndirim Oranı Hesaplama</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

/* 🟢 Hem bilgisayarda hem telefonda dikey ve yatay tam ortalama sağlayan esnek yapı */
body{
    margin:0;
    padding:20px;
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height: 100vh;
}

/* 🟢 Kutunun genişlik dengesini hem PC hem mobil için koruyan alan */
.container{
    width:100%;
    max-width:440px; /* İdeal genişlik standardı */
    background:#fff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    margin: auto; 
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:500;
    font-size:13px;
    color:#6b7a90;
}

.field-container{
    display:flex;
    gap:8px;
    align-items:center;
}

input,
button{
    width:100%;
    height:46px;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    font-size:16px; 
    text-align:center;
    background:#fff;
    font-weight:400;
    transition:.15s;
}

input:focus {
    font-size: 16px !important;
}

input:focus {
    outline: none !important;
    -webkit-fullscreen-control-style: none;
    border-color: #8fd4ae !important;
    box-shadow: 0 0 0 4px rgba(143,212,174,0.45) !important;
}

.yellow-bg{
    background:#fff7a6 !important;
}

.main-btn{
    flex:1;
    background:#fff;
    color:#2c3e50;
    font-weight:600;
    cursor:pointer;
    border:1.5px solid #c9d2dc;
    transition:.15s;
}

.main-btn:hover{
    background:#f6f8fa;
}

.main-btn:focus,
.main-btn:active{
    outline:none;
    border-color:#8fd4ae;
    box-shadow:0 0 0 4px rgba(143,212,174,0.35);
}

button.clicked-blue{
    border-color:#8fd4ae !important;
    box-shadow:0 0 0 4px rgba(143,212,174,0.45) !important;
}

.reset-btn{
    width:46px;
    min-width:46px;
    background:#fff;
    color:#2c3e50;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.15s;
}

.reset-btn:hover{
    background:#f6f8fa;
}

.reset-btn:focus,
.reset-btn:active,
.reset-btn.active-reset{
    outline:none;
    border-color:#e74c3c;
    box-shadow:0 0 0 4px rgba(231,76,60,0.35);
}

.clear-btn{
    width:40px;
    height:46px;
    min-width:40px;
    background:#3498db;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-weight:600;
    cursor:pointer;
    user-select: none;
}

.clear-btn:hover{
    background:#2587ca;
}

.button-row{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.result{
    display:none;
    margin-top:20px;
    background:#f7fbf9;
    padding:15px;
    border-radius:10px;
}

.result p{
    margin:8px 0;
    font-size:14px;
    color:#3d4f66;
}

.highlight{
    float:right;
    font-weight:600;
    color:#2c3e50;
}

.box{
    margin-top:12px;
    padding:10px;
    background:#eaf7ef;
    border-left:4px solid #2ecc71;
    border-radius:8px;
}

.box p{
    margin:6px 0;
    font-size:13px;
}

.creator{
    margin-top:22px;
    text-align:center;
    font-size:12px;
    color:#9aa6b2;
    letter-spacing:.4px;
}

</style>
</head>

<body>

<div class="container">

<div class="input-group">
<label>Ürünün Önceki Fiyatı</label>
<div class="field-container">
<input id="eskiFiyat" type="text" inputmode="decimal">
<div class="clear-btn" ontouchstart="temizle(event,'eskiFiyat')" onclick="temizle(event,'eskiFiyat')">×</div>
</div>
</div>

<div class="input-group">
<label>Ürünün Yeni Fiyatı</label>
<div class="field-container">
<input id="yeniFiyat" type="text" inputmode="decimal" class="yellow-bg">
<div class="clear-btn" ontouchstart="temizle(event,'yeniFiyat')" onclick="temizle(event,'yeniFiyat')">×</div>
</div>
</div>

<div class="button-row">

<button id="hesaplaBtn" class="main-btn" onclick="indirimHesapla()">
Hesapla
</button>

<button class="reset-btn" onclick="sifirla(event)">
↺
</button>

</div>

<div class="result" id="sonucAlani">

<p>Önceki Fiyat <span id="resEski" class="highlight"></span></p>
<p>Yeni Fiyat <span id="resYeni" class="highlight"></span></p>

<div class="box">
<p>İndirim Tutarı <span id="resTutar" class="highlight"></span></p>
<p style="font-size:15px; font-weight:700; color:#27ae60;"><b>İndirim Oranı</b> <span id="resIndirim" class="highlight" style="color:#27ae60;"></span></p>
</div>

</div>

<div class="creator">
    Created by Fatih Mersin
</div>

</div>

<script>

function temizle(e,id){
    e.preventDefault();
    e.stopPropagation();
    
    let el = document.getElementById(id);
    el.value = ""; 
    hesapGecersizYap(); 
    
    el.focus();
    
    setTimeout(() => {
        el.focus();
        if(typeof el.setSelectionRange === "function") {
            el.setSelectionRange(0, 0); 
        }
    }, 10);
}

function g(id){
    let v=document.getElementById(id).value.trim();
    if(!v) return 0;
    return parseFloat(v.replace(/\./g,"").replace(/,/g,".")) || 0;
}

function indirimHesapla(){
    let btn=document.getElementById("hesaplaBtn");
    btn.classList.add("clicked-blue");

    let eski = g("eskiFiyat");
    let yeni = g("yeniFiyat");

    let tutar = eski - yeni;
    
    // Eski fiyat sıfır veya girilmediyse sıfıra bölme (NaN / Infinity) hatasını engelleme kontrolü
    let oran = 0;
    if (eski > 0) {
        oran = (tutar / eski) * 100;
    }

    const fmt = {minimumFractionDigits:2,maximumFractionDigits:2};

    document.getElementById("resEski").innerText = eski.toLocaleString("tr-TR",fmt)+" TL";
    document.getElementById("resYeni").innerText = yeni.toLocaleString("tr-TR",fmt)+" TL";
    document.getElementById("resTutar").innerText = tutar.toLocaleString("tr-TR",fmt)+" TL";
    document.getElementById("resIndirim").innerText = "%" + oran.toLocaleString("tr-TR",fmt);

    document.getElementById("sonucAlani").style.display="block";
}

function hesapGecersizYap(){
    document.getElementById("sonucAlani").style.display="none";
    document.getElementById("hesaplaBtn").classList.remove("clicked-blue");
}

document.querySelectorAll("input")
.forEach(el=>{

    el.addEventListener("input", ()=>{
        hesapGecersizYap();
        document.querySelector(".reset-btn")
            .classList.remove("active-reset");
    });
    
    if(el.tagName === "INPUT") {
        el.addEventListener("focus", () => {
            setTimeout(() => { el.select(); }, 50);
        });
    }

});

const alanlar = Array.from(document.querySelectorAll("input"));

alanlar.forEach((el,i)=>{
    el.addEventListener("keydown",(e)=>{
        if(e.key==="Enter"){
            e.preventDefault();
            document.activeElement.blur();

            let next=alanlar[i+1];
            if(next){
                setTimeout(()=>{
                    next.focus();
                    if(next.tagName==="INPUT") next.select();
                },0);
            }else{
                indirimHesapla();
            }
        }
    });
});

function sifirla(e){
    e.preventDefault();

    document.querySelectorAll("input").forEach(i=>i.value="");

    document.getElementById("sonucAlani").style.display="none";
    document.getElementById("hesaplaBtn").classList.remove("clicked-blue");

    let resetBtn = e.currentTarget;
    resetBtn.classList.add("active-reset");
}

</script>

</body>
</html>
